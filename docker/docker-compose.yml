services:
  simplemvc:
    build:
      context: ..
      dockerfile: src/SimpleMvc/SimpleMvc/Dockerfile
    env_file:
      - ../.env
    environment:
      - STUDENT_NAME=${STUDENT_NAME}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "${APP_PORT}:8080"

  nginx:
    image: nginx:latest
    ports:
      - "4643:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - simplemvc
